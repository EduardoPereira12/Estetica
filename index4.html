<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salão de Beleza</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    color:#5a4a4a;
    scroll-behavior:smooth;
}

/* MENU */
header{
    position:fixed;
    width:100%;
    top:0;
    left:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 10%;
    z-index:1000;
    transition:0.3s;
}

.logo{
    font-family:'Playfair Display', serif;
    font-size:22px;
    font-weight:700;
    color:white;
}

nav ul{
    list-style:none;
    display:flex;
    gap:25px;
}

nav a{
    text-decoration:none;
    color:white;
    font-weight:500;
}

/* HERO FULL */
.hero{
    position:relative;
    height:100vh;
    background:url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
    display:flex;
    align-items:center;
    padding:0 10%;
}

/* Overlay escuro elegante */
.hero::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:linear-gradient(to right, rgba(0,0,0,0.6), rgba(0,0,0,0.2));
}

.hero-content{
    position:relative;
    max-width:550px;
    color:white;
}

.hero-content h1{
    font-family:'Playfair Display', serif;
    font-size:3.5rem;
    line-height:1.2;
}

.hero-content p{
    margin:20px 0;
    font-size:1.2rem;
}

.btn{
    padding:14px 30px;
    background:linear-gradient(to right,#d4a373,#b5835a);
    border:none;
    color:white;
    font-weight:600;
    cursor:pointer;
    border-radius:5px;
    transition:0.3s;
}

.btn:hover{
    opacity:0.85;
    transform:translateY(-3px);
}

/* SECTIONS */
section{
    padding:100px 10%;
    text-align:center;
}

h2{
    font-family:'Playfair Display', serif;
    font-size:2rem;
    margin-bottom:20px;
}

/* SERVIÇOS */
.services{
    background-image: url(../Imagens/fundo2.webp);
}

.services-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

/* GALERIA */
.gallery-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    border-radius:15px;
}

/* CTA */
.cta{
    background-image: url(../Imagens/fundo2.webp);
}

.cta .btn{
    margin-top:20px;
}

/* WHATSAPP FLOAT */
.whatsapp-float{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25d366;
    color:white;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    text-decoration:none;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    z-index:1000;
    transition:0.3s;
}

.whatsapp-float:hover{
    transform:scale(1.1);
}

/* RESPONSIVO */
@media(max-width:900px){

    .hero{
        padding:0 5%;
    }

    .hero-content h1{
        font-size:2.5rem;
    }

    nav ul{
        display:none;
    }

}

</style>
</head>

<body>

<header>
    <div class="logo">Seu Salão</div>
    <nav>
        <ul>
            <li><a href="#home">Início</a></li>
            <li><a href="#services">Serviços</a></li>
            <li><a href="#gallery">Galeria</a></li>
            <li><a href="#contact">Contato</a></li>
        </ul>
    </nav>
</header>

<!-- HERO -->
<section class="hero" id="home">
    <div class="hero-content">
        <h1>Cuidando<br>da Sua Beleza</h1>
        <p>Transforme-se com um toque de glamour e sofisticação</p>
        <a href="https://wa.me/5511999999999?text=Olá,%20quero%20agendar%20um%20horário" target="_blank">
            <button class="btn">AGENDAR AGORA</button>
        </a>
    </div>
</section>

<!-- SERVIÇOS -->
<section id="services" class="services">
    <h2>NOSSOS SERVIÇOS</h2>
    <div class="services-grid">
        <div class="card">Cabelo</div>
        <div class="card">Coloração</div>
        <div class="card">Manicure</div>
        <div class="card">Sobrancelhas</div>
        <div class="card">Make & Estética</div>
    </div>
</section>

<!-- GALERIA -->
<section id="gallery" class="gallery">
    <h2>GALERIA DE ESTILO</h2>
    <div class="gallery-grid">
        <img src="https://images.unsplash.com/photo-1487412720507-e7ab37603c6f">
        <img src="https://images.unsplash.com/photo-1582095133179-bfd08e2fc6b3">
        <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
    </div>
</section>

<!-- CTA -->
<section class="cta" id="contact">
    <h2>RESERVE SEU HORÁRIO HOJE MESMO!</h2>
    <p>Realce sua beleza em nosso salão.</p>
    <a href="https://wa.me/5511999999999?text=Olá,%20quero%20agendar%20um%20horário" target="_blank">
        <button class="btn">FALAR NO WHATSAPP</button>
    </a>
</section>

<!-- BOTÃO FLUTUANTE -->
<a href="https://wa.me/5511999999999?text=Olá,%20quero%20agendar%20um%20horário" 
   class="whatsapp-float" target="_blank">
   💬
</a>

<script>
window.addEventListener("scroll", function(){
    const header = document.querySelector("header");
    header.style.background = window.scrollY > 50 
        ? "rgba(0,0,0,0.8)" 
        : "transparent";
});
</script>

</body>
</html>
